name: Sign and Publish Alpine Repository

on:
  workflow_call:
    inputs:
      alpine-version:
        description: 'Alpine version (edge, v3.19, v3.20, etc.)'
        required: true
        type: string
      validation-mode:
        description: 'Validation strictness (strict/permissive/skip)'
        required: false
        type: string
        default: 'permissive'
  workflow_dispatch:
    inputs:
      alpine-version:
        description: 'Alpine version to rebuild'
        required: true
        type: choice
        options:
          - edge
          - v3.23
          - v3.22
          - v3.21
          - v3.20
          - v3.19
          - v3.18
      force-resign:
        description: 'Force re-sign all packages in repository'
        required: false
        type: boolean
        default: false
      validation-mode:
        description: 'Validation strictness (strict/permissive/skip)'
        required: false
        type: choice
        options:
          - strict      # Fail on any validation error
          - permissive  # Warn but continue on validation errors
          - skip        # Skip validation entirely
        default: 'permissive'

permissions:
  contents: write

jobs:
  sign-and-publish:
    name: Sign and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aports (for keys)
        uses: actions/checkout@v4
        with:
          path: aports

      - name: Setup signing keys
        working-directory: ./aports
        run: |
          mkdir -p .abuild-keys
          echo "${{ secrets.RSA_PRIVATE_KEY }}" | base64 -d > .abuild-keys/jambox-65ea124a.rsa
          chmod 600 .abuild-keys/jambox-65ea124a.rsa
          echo "${{ secrets.RSA_PUBLIC_KEY }}" | base64 -d > .abuild-keys/jambox-65ea124a.rsa.pub
          chmod 644 .abuild-keys/jambox-65ea124a.rsa.pub
          echo "✓ Signing keys prepared."

      - name: Checkout apk-repo
        uses: actions/checkout@v4
        with:
          repository: JamBox-IT/apk-repo
          path: apk-repo
          token: ${{ secrets.PAT_FOR_APK_REPO }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: new-packages

      - name: Merge new packages with apk-repo
        run: |
          if [ ! -d "new-packages" ]; then
            echo "No new packages were downloaded. Skipping merge."
            exit 0
          fi
          ALPINE_VER="${{ inputs.alpine-version }}"
          echo "=== Merging new packages into apk-repo ==="
          cd new-packages
          for arch_dir in packages-*/; do
            if [ -d "$arch_dir" ]; then
              arch=$(basename "$arch_dir" | sed 's/packages-//')
              DEST_DIR="../apk-repo/${ALPINE_VER}/JamBox/${arch}"
              mkdir -p "${DEST_DIR}"
              echo "Merging packages for ${arch} into ${DEST_DIR}"
              rsync -av "${arch_dir}"*.apk "${DEST_DIR}/"
            fi
          done
          echo "✓ Merge complete."
          echo "apk-repo content:"
          ls -R ../apk-repo

      - name: Copy public key to repo root
        run: |
          cp aports/.abuild-keys/jambox-65ea124a.rsa.pub apk-repo/
          echo "✓ Public key copied to apk-repo root."

      - name: Generate APKINDEX files in apk-repo
        run: |
          ALPINE_VER="${{ inputs.alpine-version }}"
          REPO_BASE="$PWD/apk-repo/${ALPINE_VER}/JamBox"
          echo "=== Generating APKINDEX for Alpine ${ALPINE_VER} in apk-repo ==="

          # Step 1: Use Alpine container to run `apk index` which produces a
          # correctly-formatted tar (no "./" prefix on filenames, unlike busybox
          # tar). This gives us an unsigned APKINDEX.tar.gz per arch directory.
          # We intentionally do NOT sign here — signing happens after patching.
          docker run --rm \
            -v "$PWD/apk-repo/${ALPINE_VER}:/repo" \
            -w /repo \
            alpine:latest sh -c '
              set -e
              # apk-tools is pre-installed; no extra packages needed for indexing
              for arch in x86_64 aarch64 armv7 armhf; do
                dir="JamBox/${arch}"
                if [ -d "${dir}" ] && ls "${dir}"/*.apk >/dev/null 2>&1; then
                  echo "Running apk index for ${arch}..."
                  # apk index reads .PKGINFO from each .apk and writes APKINDEX.
                  # --allow-untrusted: accept unsigned .apk files during indexing.
                  # -o: write output tar directly (apk-tools native format, no ./
                  #     prefix, readable by apk clients).
                  apk index --allow-untrusted -o "${dir}/APKINDEX.tar.gz" "${dir}"/*.apk
                  echo "Generated unsigned APKINDEX.tar.gz for ${arch}."
                else
                  echo "No packages found for ${arch}, skipping."
                fi
              done'

          # Step 2: On the Ubuntu host (GNU tar, not busybox), patch A:noarch
          # entries to A:<real-arch> in each APKINDEX.
          #
          # Root cause: abuild writes A:noarch into .PKGINFO for noarch packages.
          # apk index faithfully copies this as A:noarch into APKINDEX. apk v3
          # clients then construct download URLs as noarch/<pkg>.apk, which does
          # not exist (packages live under the real arch directory). Alpine's own
          # build infrastructure always rewrites A:noarch → A:<arch> at index
          # generation time; we replicate that here.
          #
          # GNU tar (unlike busybox tar) preserves exact filenames in archives
          # without adding "./" prefixes, so repacking with GNU tar is safe.
          for arch in x86_64 aarch64 armv7 armhf; do
            INDEX_TAR="${REPO_BASE}/${arch}/APKINDEX.tar.gz"
            if [ ! -f "${INDEX_TAR}" ]; then
              continue
            fi
            echo "Patching A:noarch -> A:${arch} in APKINDEX for ${arch}..."

            WORK_DIR=$(mktemp -d)
            trap "rm -rf '${WORK_DIR}'" EXIT

            # Extract using GNU tar — filenames come out without "./" prefix.
            tar -xzf "${INDEX_TAR}" -C "${WORK_DIR}"

            # Verify the extracted file is named "APKINDEX" (no "./" prefix).
            # If something went wrong and it has a "./" prefix, abort clearly.
            if [ ! -f "${WORK_DIR}/APKINDEX" ]; then
              echo "ERROR: Expected ${WORK_DIR}/APKINDEX but got:"
              ls -la "${WORK_DIR}/"
              exit 1
            fi

            # Replace A:noarch with A:<arch>. This is an exact-line match to
            # avoid accidentally touching package names or descriptions that
            # might contain the substring "noarch".
            sed -i "s/^A:noarch\$/A:${arch}/" "${WORK_DIR}/APKINDEX"

            # Repack with GNU tar. -C changes into the work dir so the archive
            # member is stored as "APKINDEX" (not "./APKINDEX" or an abs path).
            tar -czf "${INDEX_TAR}" -C "${WORK_DIR}" APKINDEX

            rm -rf "${WORK_DIR}"
            trap - EXIT
            echo "Patched APKINDEX.tar.gz for ${arch}."
          done

          # Step 3: Sign each APKINDEX.tar.gz with abuild-sign inside the
          # Alpine container. abuild-sign prepends the RSA signature as a
          # .SIGN.RSA.<keyname>.pub member to the tar, which is what apk
          # clients verify on install.
          docker run --rm \
            -v "$PWD/apk-repo/${ALPINE_VER}:/repo" \
            -v "$PWD/aports/.abuild-keys:/keys:ro" \
            -w /repo \
            alpine:latest sh -c '
              set -e
              apk add --no-cache abuild
              mkdir -p ~/.abuild /etc/apk/keys
              cp /keys/jambox-65ea124a.rsa ~/.abuild/
              chmod 600 ~/.abuild/jambox-65ea124a.rsa
              cp /keys/jambox-65ea124a.rsa.pub /etc/apk/keys/
              chmod 644 /etc/apk/keys/jambox-65ea124a.rsa.pub
              for arch in x86_64 aarch64 armv7 armhf; do
                index="JamBox/${arch}/APKINDEX.tar.gz"
                if [ -f "${index}" ]; then
                  echo "Signing APKINDEX.tar.gz for ${arch}..."
                  abuild-sign -k ~/.abuild/jambox-65ea124a.rsa "${index}"
                  echo "Signed APKINDEX.tar.gz for ${arch}."
                fi
              done'
          echo "=== APKINDEX generation and signing complete. ==="

      - name: Commit and Push to apk-repo
        working-directory: ./apk-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Update Alpine ${{ inputs.alpine-version }} repository from aports build #${{ github.run_number }}"
            git push
            echo "✓ Changes pushed to apk-repo."
          else
            echo "✓ No changes to commit to apk-repo."
          fi

      - name: Generate repository URL
        run: |
          ALPINE_VER="${{ inputs.alpine-version }}"
          REPO_URL="https://jambox-it.github.io/apk-repo"
          echo "=========================================="
          echo "Alpine Repository Published!"
          echo "=========================================="
          echo "Add the public key to your Alpine system:"
          echo "wget -O /etc/apk/keys/jambox-65ea124a.rsa.pub ${REPO_URL}/jambox-65ea124a.rsa.pub"
          echo ""
          echo "Then add the repository to /etc/apk/repositories:"
          echo "${REPO_URL}/${ALPINE_VER}/JamBox"
          echo ""
